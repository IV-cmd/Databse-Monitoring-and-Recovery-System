<div class="table-container">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="table-loading">
    <app-loading [config]="{ message: 'Loading data...', type: 'dots', size: 'medium' }"></app-loading>
  </div>

  <!-- Empty State -->
  <div *ngIf="isEmpty" class="table-empty">
    <div class="empty-icon">📭</div>
    <div class="empty-message">{{ config.emptyMessage }}</div>
  </div>

  <!-- Table -->
  <div *ngIf="!isLoading && !isEmpty" class="table-wrapper">
    <table [ngClass]="tableClass">
      <!-- Header -->
      <thead>
        <tr>
          <!-- Select All Checkbox -->
          <th *ngIf="config.selectable" class="table-checkbox">
            <input 
              type="checkbox" 
              [checked]="allSelected"
              (click)="onSelectAll($event)"
              class="checkbox"
            >
          </th>
          
          <!-- Column Headers -->
          <th 
            *ngFor="let column of config.columns" 
            [class.sortable]="column.sortable"
            [class.sorted]="config.sort?.field === column.key"
            (click)="onSort(column)"
            [style.width]="column.width"
          >
            <div class="header-content">
              <span class="column-label">{{ column.label }}</span>
              <span *ngIf="column.sortable" class="sort-icon">{{ getSortIcon(column) }}</span>
            </div>
          </th>
        </tr>
      </thead>

      <!-- Body -->
      <tbody>
        <tr 
          *ngFor="let row of config.data; trackBy: trackByFn"
          [class.selected]="isRowSelected(row)"
          (click)="onRowClick(row, $event)"
          class="table-row"
        >
          <!-- Row Checkbox -->
          <td *ngIf="config.selectable" class="table-checkbox">
            <input 
              type="checkbox" 
              [checked]="isRowSelected(row)"
              (click)="onRowSelect(row, $event)"
              class="checkbox"
            >
          </td>
          
          <!-- Row Data -->
          <td *ngFor="let column of config.columns" class="table-cell">
            {{ getCellValue(row, column) }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="showPagination" class="table-pagination">
    <div class="pagination-info">
      Showing {{ getStartItem() }} 
      to {{ getEndItem() }} 
      of {{ config.pagination?.total || 0 }} entries
    </div>
    
    <div class="pagination-controls">
      <button 
        class="pagination-btn" 
        [disabled]="config.pagination?.page === 1"
        (click)="onPageClick(getPreviousPage())"
      >
        ← Previous
      </button>
      
      <div class="page-numbers">
        <button 
          *ngFor="let page of getPageNumbers()" 
          class="pagination-btn"
          [class.active]="page === config.pagination?.page"
          [disabled]="page === '...'"
          (click)="onPageClick(page)"
        >
          {{ page }}
        </button>
      </div>
      
      <button 
        class="pagination-btn" 
        [disabled]="config.pagination?.page === config.pagination?.totalPages"
        (click)="onPageClick(getNextPage())"
      >
        Next →
      </button>
    </div>
  </div>
</div>
