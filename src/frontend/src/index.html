<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Database Monitoring System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CERN Database Monitoring System - Real-time database performance monitoring and recovery">
  <meta name="keywords" content="database, monitoring, cern, performance, recovery">
  <meta name="author" content="CERN Database Team">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preconnect to external fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Theme support -->
  <script>
    // Check for saved theme preference or default to light
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  
  <!-- Prevent FOUC (Flash of Unstyled Content) -->
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--background-color, #f9fafb);
      color: var(--text-primary, #111827);
    }
    
    app-root {
      display: block;
      min-height: 100vh;
    }
    
    /* Loading state */
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .app-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f3f4f6;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <app-root>
    <!-- Loading state while Angular boots -->
    <div class="app-loading">
      <div class="app-loading-spinner"></div>
    </div>
  </app-root>
</body>
</html>
